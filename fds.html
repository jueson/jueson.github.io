---
title: 友五
layout: default
---
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友情链接 - 强制换行显示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>  
  
{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* 页面基础样式：浅色渐变背景+深灰文字，适合长文阅读 */
body {
    background: linear-gradient(135deg, #f5f7fa, #e4edf9, #fdf2e9); /* 柔和米白/淡蓝/浅黄渐变 */
    color: #2d3748; /* 深灰文字，对比度适中不刺眼 */
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 内容容器：限制宽度并居中，保证大屏幕阅读舒适度 */
.container {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 20px;
}

/* 页头：包含主标题与副标题，半透明白色背景+磨砂效果 */
header {
    text-align: center;
    margin-bottom: 40px;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.5); /* 半透明白色 */
    border-radius: 15px;
    backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05); /* 浅阴影 */
    width: 100%;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    color: #2b6cb0; /* 深蓝色标题，突出重点 */
    text-shadow: 0 1px 5px rgba(0, 0, 0, 0.08); /* 浅文字阴影 */
}

header .subtitle {
    font-size: 1.1rem;
    opacity: 0.8;
    max-width: 700px;
    margin: 0 auto;
    line-height: 1.7;
}

/* 内容区域：双列布局，小屏幕自动堆叠 */
.content {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

/* 卡片组件：带悬停动画的信息容器 */
.card {
    flex: 1;
    min-width: 300px;
    background: rgba(255, 255, 255, 0.8); /* 半透明白色卡片 */
    border-radius: 15px;
    padding: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-5px); /* 轻微上浮 */
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); /* 加深阴影增强层次感 */
}

.card h2 {
    font-size: 1.6rem;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid rgba(43, 108, 176, 0.2); /* 深蓝底边框 */
    display: flex;
    align-items: center;
    gap: 10px;
}

.card h2 i {
    color: #f6ad55; /* 淡橙色图标，呼应细节 */
}

/* 原始列表样式：展示旧版导航的问题（横向排列） */
.original-list {
    background: rgba(0, 0, 0, 0.05); /* 极淡灰色背景 */
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.original-list ul {
    list-style: none;
    padding: 0;
}

.original-list li {
    display: inline-block; /* 横向排列 */
    margin-right: 15px;
    background: rgba(255, 255, 255, 0.7); /* 浅白背景 */
    padding: 8px 15px;
    border-radius: 30px;
    transition: all 0.3s ease;
}

.original-list li:hover {
    background: rgba(255, 255, 255, 0.9); /*  hover提亮 */
    transform: scale(1.03); /* 轻微放大 */
}

.original-list a {
    color: #2b6cb0; /* 深蓝链接 */
    text-decoration: none;
    font-weight: 500;
}

/* 解决方案列表：优化后的纵向排列+交互细节 */
.solution-list {
    background: rgba(0, 0, 0, 0.05);
    padding: 20px;
    border-radius: 10px;
}

.solution-list ul {
    list-style: none;
    padding: 0;
}

.solution-list li {
    display: block; /* 关键：强制纵向换行 */
    margin-bottom: 12px;
    background: rgba(255, 255, 255, 0.7);
    padding: 12px 20px;
    border-radius: 8px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* 左侧装饰条动画 */
.solution-list li:before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background: #f6ad55; /* 淡橙色装饰条 */
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.3s ease;
}

.solution-list li:hover {
    background: rgba(255, 255, 255, 0.85); /*  hover提亮 */
    transform: translateX(5px); /* 轻微右移 */
}

.solution-list li:hover:before {
    transform: scaleY(1); /* 装饰条展开 */
}

.solution-list a {
    color: #2d3748; /* 深灰链接，适配浅色背景 */
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
}

.solution-list i {
    color: #f6ad55; /* 淡橙色图标，呼应装饰条 */
    font-size: 1.1rem;
}

/* 说明部分：解释样式逻辑与阅读重点 */
.explanation {
    margin-top: 30px;
    background: rgba(0, 0, 0, 0.05);
    padding: 25px;
    border-radius: 15px;
    line-height: 1.8;
}

.explanation h3 {
    font-size: 1.4rem;
    margin-bottom: 15px;
    color: #2b6cb0; /* 深蓝标题 */
}

.code-block {
    background: rgba(0, 0, 0, 0.03); /* 极淡代码背景 */
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    font-family: monospace;
    overflow-x: auto;
    line-height: 1.6;
    color: #2d3748;
}

.highlight {
    color: #f6ad55; /* 高亮关键词 */
    font-weight: bold;
}

/* 页脚：补充信息，半透明设计不抢焦点 */
footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
    width: 100%;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 15px;
    font-size: 0.9rem;
    opacity: 0.8;
    color: #718096; /* 淡灰文字 */
}

/* 小屏幕适配：单列布局+字体调整 */
@media (max-width: 768px) {
    .content {
        flex-direction: column;
    }

    header h1 {
        font-size: 2rem;
    }
</style>

{% if page.nav-style == "invert" or page.header-style == "text" %}
<nav class="navbar navbar-default navbar-custom navbar-fixed-top invert">
    {% else %}
    <nav class="navbar navbar-default navbar-custom navbar-fixed-top">
        {% endif %}
        <div class="container-fluid">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header page-scroll">
                <button type="button" class="navbar-toggle">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
            </div>

            <!-- Collect the nav links, forms, and other content for toggling -->
            <div id="huxblog_navbar">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav navbar-right">
                        <li>
                            <a href="{{ site.baseurl }}/">首页</a>
                        </li>
                        {% for page in site.pages %}
                        {% if page.title and page.hide-in-nav != true %}
                        <li>
                            <a href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
                        </li>
                        {% endif %}
                        {% endfor %}
                        <li class="search-icon">
                            <a href="javascript:void(0)">
                                <i class="fa fa-search"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container -->
    </nav>

    <script>
        // Drop Bootstarp low-performance Navbar
        // Use customize navbar with high-quality material design animation
        // in high-perf jank-free CSS3 implementation
        var $body = document.body;
        var $toggle = document.querySelector('.navbar-toggle');
        var $navbar = document.querySelector('#huxblog_navbar');
        var $collapse = document.querySelector('.navbar-collapse');

        var __HuxNav__ = {
            close: function () {
                $navbar.className = " ";
                // wait until animation end.
                setTimeout(function () {
                    // prevent frequently toggle
                    if ($navbar.className.indexOf('in') < 0) {
                        $collapse.style.height = "0px"
                    }
                }, 400)
            },
            open: function () {
                $collapse.style.height = "auto"
                $navbar.className += " in";
            }
        }

        // Bind Event
        $toggle.addEventListener('click', function (e) {
            if ($navbar.className.indexOf('in') > 0) {
                __HuxNav__.close()
            } else {
                __HuxNav__.open()
            }
        })

        /**
         * Since Fastclick is used to delegate 'touchstart' globally
         * to hack 300ms delay in iOS by performing a fake 'click',
         * Using 'e.stopPropagation' to stop 'touchstart' event from 
         * $toggle/$collapse will break global delegation.
         * 
         * Instead, we use a 'e.target' filter to prevent handler
         * added to document close HuxNav.  
         *
         * Also, we use 'click' instead of 'touchstart' as compromise
         */
        document.addEventListener('click', function (e) {
            if (e.target == $toggle) return;
            if (e.target.className == 'icon-bar') return;
            __HuxNav__.close();
        })
    </script>
